
<!DOCTYPE html>

<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" type="text/css" href="//fonts.googleapis.com/css?family=Ubuntu" />
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="filter.css">
</head>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>


<script type="text/javascript">
    var test;
    $(document).ready(function() {
        $('#plot').click(function () {
            var val1 = $('#Value1').val();
            var val2 = $('#Value2').val();
            $("#Value1 > [value=" + val1 + "]").attr("selected", "true");
            $("#Value2 > [value=" + val2 + "]").attr("selected", "true");
            var name1 = $('#Value1 option:selected').text();
            var name2 = $('#Value2 option:selected').text();

            $.ajax({
                type: 'POST',
                url: 'value.php',
                data: {Value1: val1, Value2: val2},
                success: function (response) {
                    //$('#plot_result').html(response);
                    test = JSON.parse(response)//JSON.parse(response);
                    //$('#plot_result').html(test['err1']);
                    var x_max = Math.max(...test['Value1']);
                    var y_max = Math.max(...test['Value2']);
                    var trace1 = {
                        x: test['Value1'],
                        y: test['Value2'],

                        /*error_x: {
                            type: 'data',
                            array: test['err1'],
                            visible: true
                        },
                        error_y: {
                            type: 'data',
                            array: test['err2'],
                            visible: true
                        },
                        },*/
                        mode: 'markers'
                    };
                    var data = [trace1];
                    var layout = {
                        title: {
                            //text:'Plot Title',
                            font: {
                                family: 'Ubuntu, monospace',
                                size: 24
                            },
                            xref: 'paper',
                            x: 0.5, //center title
                        },
                        xaxis: {
                            title: {
                                text: name1,
                                font: {
                                    family: 'Ubuntu, monospace',
                                    size: 18,
                                    color: '#7f7f7f'
                                }
                            },
                            range: [0, 1.1 * x_max]
                        },
                        yaxis: {
                            title: {
                                text: name2,
                                font: {
                                    family: 'Ubuntu, monospace',
                                    size: 18,
                                    color: '#7f7f7f'
                                }
                            },
                            range: [0, 1.1 * y_max]
                        }
                    };
                    Plotly.newPlot('plot_result', data, layout, {showSendToCloud: true});
                }
            });
        })
    })
</script>

                                                <option value="R_cool_3" label="Cooling Radius at 3 Gyr">Cooling Radius at 3 Gyr</option>

                                                <option value="ID" label="ID">ID</option>

                                                <option value="R_cool_3" label="Cooling Radius at 3 Gyr">Cooling Radius at 3 Gyr</option>
