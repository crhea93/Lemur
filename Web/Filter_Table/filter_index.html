<script type="text/javascript">
    var test;
    $(document).ready(function() {
        $('#button').click(function () {
            var val1 = $('#Name').val();
            $.ajax({
                type: 'POST',
                url: 'search.php',
                data: {Name: val1},
                success: function (response) {
                    //$('#result').html(response);
                    test = JSON.parse(response)//JSON.parse(response);
                    document.getElementById("result").innerHTML = test['redshift'];
                }
            });
        });
        //document.getElementById("result").innerHTML = test["redshift"];
    });
</script>

<script type="text/javascript">
    var test;
    $(document).ready(function() {
        $('#plot').click(function () {
            var val1 = $('#Value1').val();
            var val2 = $('#Value2').val();
            $("#Value1 > [value=" + val1 + "]").attr("selected", "true");
            $("#Value2 > [value=" + val2 + "]").attr("selected", "true");
            var name1 = $('#Value1 option:selected').text();
            var name2 = $('#Value2 option:selected').text();

            $.ajax({
                type: 'POST',
                url: 'value.php',
                data: {Value1: val1, Value2: val2},
                success: function (response) {
                    //$('#result').html(response);
                    test = JSON.parse(response)//JSON.parse(response);
                    var trace1 = {
                        x: test['Value1'],
                        y: test['Value2'],
                        /*error_x: {
                            type: 'data',
                            array: test['err1'],
                            visible: true
                        },
                        error_y: {
                            type: 'data',
                            array: test['err2'],
                            visible: true
                        },*/
                        mode: 'markers'
                    };
                    var data = [trace1];
                    var layout = {
                        title: {
                            //text:'Plot Title',
                            font: {
                                family: 'Ubuntu, monospace',
                                size: 24
                            },
                            xref: 'paper',
                            x: 0.5, //center title
                        },
                        xaxis: {
                            title: {
                                text: name1,
                                font: {
                                    family: 'Ubuntu, monospace',
                                    size: 18,
                                    color: '#7f7f7f'
                                }
                            },
                        },
                        yaxis: {
                            title: {
                                text: name2,
                                font: {
                                    family: 'Ubuntu, monospace',
                                    size: 18,
                                    color: '#7f7f7f'
                                }
                            }
                        }
                    };
                    Plotly.newPlot('plot_result', data, layout, {showSendToCloud: true});
                }
            });
        });
        //document.getElementById("result").innerHTML = test["redshift"];
    });
</script>


<script>
    function showUser(str) {
        if (str == "") {
            document.getElementById("txtHint").innerHTML = "";
            return;
        } else {
            if (window.XMLHttpRequest) {
                // code for IE7+, Firefox, Chrome, Opera, Safari
                xmlhttp = new XMLHttpRequest();
            } else {
                // code for IE6, IE5
                xmlhttp = new ActiveXObject("Microsoft.XMLHTTP");
            }
            xmlhttp.onreadystatechange = function() {
                if (this.readyState == 4 && this.status == 200) {
                    document.getElementById("txtHint").innerHTML = this.responseText;
                }
            };
            xmlhttp.open("GET","values.php?q="+str,true);
            xmlhttp.send();
        }
    }
</script>
