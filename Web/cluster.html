<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" type="image/png" href="Table/images/icons/udem.png" />
        <link
            rel="stylesheet"
            type="text/css"
            href="//fonts.googleapis.com/css?family=Ubuntu:300,400,500,700"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css?family=IBM+Plex+Sans:300,400,500,600,700"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap"
        />
        <link
            rel="stylesheet"
            href="https://www.w3schools.com/w3css/4/w3.css"
        />
        <link
            href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.3/css/font-awesome.min.css"
            rel="stylesheet"
        />
        <link href="css/bootstrap.min.css" rel="stylesheet" />
        <link rel="stylesheet" type="text/css" href="css/nav.css" />
        <title>Cluster Detail</title>
        <style>
            :root {
                --bg-0: #f7f4fb;
                --bg-1: #eee7f8;
                --paper: rgba(255, 255, 255, 0.8);
                --paper-strong: rgba(255, 255, 255, 0.92);
                --ink-0: #21192f;
                --ink-1: #483b5d;
                --ink-2: #6f6385;
                --line: rgba(95, 78, 131, 0.2);
                --accent: #8f78c4;
                --accent-deep: #7159a6;
                --accent-soft: rgba(143, 120, 196, 0.14);
                --shadow-soft: 0 14px 36px rgba(74, 58, 110, 0.13);
                --shadow-hard: 0 24px 56px rgba(56, 38, 88, 0.18);
            }

            body {
                font-family: "DM Sans", "IBM Plex Sans", sans-serif;
                background:
                    radial-gradient(
                        1200px 600px at 15% 10%,
                        rgba(188, 166, 236, 0.32),
                        transparent 55%
                    ),
                    radial-gradient(
                        900px 520px at 85% 5%,
                        rgba(146, 122, 204, 0.18),
                        transparent 60%
                    ),
                    linear-gradient(160deg, var(--bg-0), var(--bg-1));
                color: var(--ink-1);
                min-height: 100vh;
            }

            a {
                color: var(--accent);
                text-decoration: none;
            }

            a:hover,
            a:focus {
                color: var(--accent-deep);
            }

            .hero {
                padding: 60px 0 20px;
                position: relative;
                overflow: hidden;
            }

            .hero::before {
                content: "";
                position: absolute;
                inset: 0;
                background:
                    radial-gradient(
                        circle at 70% 58%,
                        rgba(143, 120, 196, 0.12),
                        transparent 50%
                    ),
                    repeating-linear-gradient(
                        -30deg,
                        rgba(143, 120, 196, 0.07),
                        rgba(143, 120, 196, 0.07) 1px,
                        transparent 1px,
                        transparent 16px
                    );
                opacity: 0.85;
                pointer-events: none;
            }

            .hero-content {
                position: relative;
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 24px;
                display: grid;
                grid-template-columns: minmax(280px, 1.1fr) minmax(260px, 0.9fr);
                gap: 28px;
                align-items: start;
            }

            .hero-title {
                font-family: "Cormorant Garamond", Georgia, serif;
                font-size: clamp(2.8rem, 4.4vw, 4.3rem);
                font-weight: 600;
                letter-spacing: 0.01em;
                color: var(--ink-0);
            }

            .hero-subtitle {
                font-size: 1rem;
                text-transform: uppercase;
                letter-spacing: 0.2em;
                color: var(--ink-2);
            }

            .stat-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 14px;
                margin-top: 20px;
            }

            .stats-column {
                /* Align stat cards with the top edge of the image panel */
                padding-top: 136px;
            }

            .cluster-image {
                margin-top: 20px;
                background: var(--paper-strong);
                border: 1px solid var(--line);
                border-radius: 16px;
                padding: 12px;
                box-shadow: var(--shadow-soft);
            }

            .cluster-image img {
                width: 100%;
                border-radius: 10px;
                display: block;
            }

            .obsid-box {
                margin-top: 16px;
                background: var(--paper-strong);
                border: 1px solid var(--line);
                border-radius: 14px;
                padding: 14px 16px;
                color: var(--ink-1);
                font-size: 1.02rem;
            }

            .obsid-box span {
                display: block;
                font-size: 0.75rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--ink-2);
                margin-bottom: 6px;
            }

            .cluster-nav {
                margin-top: 16px;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .cluster-nav a,
            .cluster-nav .nav-disabled {
                background: var(--paper-strong);
                border: 1px solid var(--line);
                border-radius: 12px;
                padding: 10px 12px;
                min-height: 66px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 4px;
            }

            .cluster-nav a {
                color: var(--ink-1);
                transition:
                    background-color 160ms ease,
                    border-color 160ms ease;
            }

            .cluster-nav a:hover,
            .cluster-nav a:focus {
                background-color: rgba(255, 255, 255, 0.96);
                border-color: rgba(95, 78, 131, 0.34);
                color: var(--ink-0);
            }

            .cluster-nav .nav-label {
                font-size: 0.72rem;
                text-transform: uppercase;
                letter-spacing: 0.16em;
                color: var(--ink-2);
            }

            .cluster-nav .nav-name {
                font-size: 0.98rem;
                font-weight: 600;
                line-height: 1.25;
                word-break: break-word;
            }

            .cluster-nav .nav-disabled {
                opacity: 0.55;
                color: var(--ink-2);
            }

            .download-row {
                margin-top: 18px;
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
            }

            .fits-note {
                margin-top: 6px;
                color: var(--ink-2);
                font-size: 0.92rem;
                line-height: 1.45;
            }

            .download-btn {
                padding: 12px 20px;
                border-radius: 999px;
                font-weight: 600;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                background: linear-gradient(135deg, #9378d3, #7459ae);
                color: #fff;
                border: none;
                box-shadow: 0 12px 22px rgba(97, 74, 150, 0.28);
                display: inline-flex;
                align-items: center;
                gap: 8px;
            }

            .download-btn[aria-disabled="true"] {
                background: rgba(255, 255, 255, 0.08);
                color: var(--ink-2);
                box-shadow: none;
                cursor: not-allowed;
            }

            .stat-card {
                background: var(--paper-strong);
                border: 1px solid var(--line);
                border-radius: 14px;
                padding: 14px;
            }

            .stat-card span {
                display: block;
                color: var(--ink-2);
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.2em;
            }

            .stat-card strong {
                font-size: 1.2rem;
                color: var(--accent-deep);
            }

            .section {
                max-width: 1200px;
                margin: 0 auto;
                padding: 24px;
            }

            .section h2 {
                font-size: 1.2rem;
                text-transform: uppercase;
                letter-spacing: 0.2em;
                color: var(--accent-deep);
                margin-bottom: 16px;
            }

            .panel {
                background: var(--paper-strong);
                border: 1px solid var(--line);
                border-radius: 16px;
                padding: 20px;
                box-shadow: var(--shadow-soft);
            }

            .plots-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: 16px;
            }

            .plot-card {
                background: rgba(255, 255, 255, 0.84);
                border-radius: 12px;
                border: 1px solid var(--line);
                padding: 12px;
            }

            .plot-card img {
                width: 100%;
                border-radius: 8px;
            }

            .plot-card h4 {
                margin-top: 10px;
                font-size: 0.85rem;
                color: var(--ink-2);
                text-transform: uppercase;
                letter-spacing: 0.16em;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                color: var(--ink-1);
            }

            th,
            td {
                padding: 10px 12px;
                border-bottom: 1px solid var(--line);
            }

            th {
                color: var(--accent-deep);
                text-transform: uppercase;
                letter-spacing: 0.12em;
                font-size: 0.75rem;
            }

            @media (max-width: 980px) {
                .hero-content {
                    grid-template-columns: 1fr;
                }

                .stats-column {
                    padding-top: 0;
                }
            }
        </style>
    </head>
    <body>
        <div class="w3-bar" id="nav">
            <a href="/index.html" class="w3-bar-item w3-button w3-hover-teal"
                >Home</a
            >
            <a
                href="/Table/index_table.html"
                class="w3-bar-item w3-button w3-hover-teal"
                >Cluster Table</a
            >
        </div>

        <section class="hero">
            <div class="hero-content">
                <div>
                    <div class="hero-subtitle">Cluster detail</div>
                    <h1 class="hero-title" id="cluster-name">Loading...</h1>
                    <div class="cluster-image" id="cluster-image"></div>
                </div>
                <div class="stats-column">
                    <div class="stat-grid" id="cluster-stats"></div>
                    <div class="obsid-box" id="cluster-obsids"></div>
                    <div class="cluster-nav" id="cluster-nav"></div>
                    <div class="download-row" id="fits-download"></div>
                    <div class="fits-note">
                        FITS download: cleaned 0.5-7.0 keV unbinned image.
                    </div>
                </div>
            </div>
        </section>

        <script>
            function getClusterName() {
                const path = window.location.pathname;
                if (path.startsWith("/cluster/")) {
                    return decodeURIComponent(path.replace("/cluster/", ""));
                }
                const params = new URLSearchParams(window.location.search);
                return params.get("name");
            }

            function formatValue(value) {
                if (value === null || value === undefined || value === "") {
                    return "None";
                }
                return value;
            }

            function formatRedshift(value) {
                if (value === null || value === undefined || value === "") {
                    return "None";
                }
                const numeric = Number(value);
                if (
                    !Number.isNaN(numeric) &&
                    (numeric === 0 || numeric === 0.05)
                ) {
                    return "N/A";
                }
                return value;
            }

            async function loadCluster() {
                const name = getClusterName();
                if (!name) {
                    document.getElementById("cluster-name").textContent =
                        "Cluster not specified";
                    return;
                }

                const response = await fetch(
                    `/api/clusters/${encodeURIComponent(name)}`,
                );
                if (!response.ok) {
                    document.getElementById("cluster-name").textContent =
                        "Cluster not found";
                    return;
                }

                const data = await response.json();
                const cluster = data.cluster;

                document.getElementById("cluster-name").textContent =
                    cluster.Name;

                const stats = [
                    {
                        label: "Redshift",
                        value: formatRedshift(cluster.redshift),
                    },
                    { label: "Right Asc", value: cluster.RightAsc },
                    { label: "Declination", value: cluster.Declination },
                ];

                const statsEl = document.getElementById("cluster-stats");
                statsEl.innerHTML = stats
                    .map(
                        (stat) => `
                        <div class="stat-card">
                            <span>${stat.label}</span>
                            <strong>${formatValue(stat.value)}</strong>
                        </div>
                    `,
                    )
                    .join("");

                const downloadRow = document.getElementById("fits-download");
                const downloadUrl =
                    data.fits_download_url ||
                    `/api/fits/${encodeURIComponent(cluster.Name)}/download`;
                downloadRow.innerHTML = `
                    <a class="download-btn" href="${downloadUrl}">
                        Download FITS
                        <i class="fa fa-download" aria-hidden="true"></i>
                    </a>
                `;

                const plotFiles = data.plots.files.filter(
                    (file) => !file.toLowerCase().includes("lightcurve"),
                );
                const mainImage = plotFiles.find(
                    (file) => file.toLowerCase() === "bkgsub_exp.png",
                );
                const imageEl = document.getElementById("cluster-image");
                if (mainImage) {
                    imageEl.innerHTML = `
                        <img src="${data.plots.base_url}/${mainImage}" alt="Cluster background-subtracted exposure" />
                    `;
                } else {
                    imageEl.innerHTML = "<p>No image available.</p>";
                }

                const obsidsEl = document.getElementById("cluster-obsids");
                const obsidsText = data.obsids.length
                    ? data.obsids.join(", ")
                    : "None";
                obsidsEl.innerHTML = `
                    <span>Obsids</span>
                    ${obsidsText}
                `;

                const navEl = document.getElementById("cluster-nav");
                try {
                    const listResp = await fetch("/api/clusters");
                    if (!listResp.ok) {
                        throw new Error("Failed to fetch cluster list.");
                    }
                    const list = await listResp.json();
                    const names = Array.isArray(list)
                        ? list.map((item) => item.Name).filter(Boolean)
                        : [];
                    const currentIndex = names.findIndex(
                        (n) =>
                            String(n).toLowerCase() ===
                            String(cluster.Name).toLowerCase(),
                    );

                    const prevName =
                        currentIndex > 0 ? names[currentIndex - 1] : null;
                    const nextName =
                        currentIndex >= 0 && currentIndex < names.length - 1
                            ? names[currentIndex + 1]
                            : null;

                    const prevHtml = prevName
                        ? `
                            <a href="/cluster/${encodeURIComponent(prevName)}" aria-label="Previous cluster: ${prevName}">
                                <span class="nav-label">&larr; Previous</span>
                                <span class="nav-name">${prevName}</span>
                            </a>
                        `
                        : `
                            <div class="nav-disabled" aria-disabled="true">
                                <span class="nav-label">&larr; Previous</span>
                                <span class="nav-name">None</span>
                            </div>
                        `;

                    const nextHtml = nextName
                        ? `
                            <a href="/cluster/${encodeURIComponent(nextName)}" aria-label="Next cluster: ${nextName}">
                                <span class="nav-label">Next &rarr;</span>
                                <span class="nav-name">${nextName}</span>
                            </a>
                        `
                        : `
                            <div class="nav-disabled" aria-disabled="true">
                                <span class="nav-label">Next &rarr;</span>
                                <span class="nav-name">None</span>
                            </div>
                        `;

                    navEl.innerHTML = prevHtml + nextHtml;
                } catch (err) {
                    navEl.innerHTML = "";
                }
            }

            loadCluster();
        </script>
    </body>
</html>
